name: Deploy Dioxus WASM

on:
  push:
    branches: ["main"]

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  DIOXUS_CONFIG_NON_INTERACTIVE: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ hashFiles('Dioxus.toml') }}

      - name: Install system dependencies
        run: pip3 install --quiet pillow

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version "^0.7" --locked

      - name: Build Project
        run: dx build --release --platform web

      - name: Normalize dist to upload root
        run: |
          if [ -d "target/dx/greek_morph/release/web/public" ]; then
            mkdir -p dist
            cp -r target/dx/greek_morph/release/web/public/. dist/
          elif [ -f "dist/index.html" ]; then
            echo "dist/ already correct"
          else
            echo "ERROR: no build output found"; exit 1
          fi

      - name: Debug build output (raw)
        run: |
          echo "=== dist/index.html (raw) ==="
          cat dist/index.html
          echo "=== dist/assets/ ==="
          ls dist/assets/

      - name: Fix absolute asset paths for GitHub Pages subdirectory
        run: |
          # Dioxus generates /./assets/ in index.html and /assets/ in JS bundle.
          # Both resolve from domain root and miss the /greek_app/ prefix.
          # base_path in [web.app] fixes the router; these sed calls fix the URLs.
          sed -i 's|/\./assets/|/greek_app/assets/|g' dist/index.html
          sed -i 's|/\./assets/|/greek_app/assets/|g' dist/assets/*.js
          sed -i 's|"/assets/|"/greek_app/assets/|g'  dist/assets/*.js
          sed -i "s|'/assets/|'/greek_app/assets/|g"  dist/assets/*.js
          echo "=== dist/index.html (after fix) ==="
          cat dist/index.html

      - name: Generate PWA icons
        run: |
          python3 << 'PYEOF'
          from PIL import Image
          img = Image.open("assets/icon-pepe.png").convert("RGBA")
          img.resize((192, 192), Image.LANCZOS).save("dist/icon-192.png", "PNG")
          img.resize((512, 512), Image.LANCZOS).save("dist/icon-512.png", "PNG")
          sizes = [(16,16),(32,32),(48,48)]
          frames = [img.resize(s, Image.LANCZOS) for s in sizes]
          frames[0].save("dist/favicon.ico", format="ICO", sizes=sizes, append_images=frames[1:])
          PYEOF

      - name: Copy PWA assets to dist root
        run: |
          cp assets/manifest.json dist/manifest.json
          cp assets/sw.js dist/sw.js
          # 404.html needed for SPA routing on GitHub Pages
          cp dist/index.html dist/404.html

      - name: Inject SW cache version and precache manifest
        run: |
          CACHE_VER=$(git rev-parse --short HEAD)
          sed -i "s|'__CACHE_VERSION__'|'greek-app-${CACHE_VER}'|g" dist/sw.js
          python3 << 'EOF'
          import os
          assets = ',\n'.join(
              f'  "/greek_app/assets/{f}"'
              for f in sorted(os.listdir('dist/assets'))
          )
          path = 'dist/sw.js'
          sw = open(path).read()
          sw = sw.replace("  '__PRECACHE_ASSETS__'", assets)
          open(path, 'w').write(sw)
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
