name: Deploy Dioxus WASM

on:
  push:
    branches: ["main"]

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  DIOXUS_CONFIG_NON_INTERACTIVE: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get install -y librsvg2-bin

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version "^0.7" --locked

      - name: Build Project
        run: dx build --release --platform web

      - name: Find and normalize dist directory
        run: |
          echo "=== Searching for index.html ==="
          find . -name "index.html" \
            -not -path "./.git/*" \
            -not -path "./target/debug/*" \
            -not -path "./target/wasm-dev/*" \
            -not -path "./target/wasm32-unknown-unknown/wasm-dev/*"

          if [ -d "dist" ]; then
            echo "Using: dist/"
          elif [ -d "target/dx/morph-app/release/web/public" ]; then
            ln -s "$(pwd)/target/dx/morph-app/release/web/public" dist
            echo "Symlinked target/dx/morph-app/release/web/public → dist/"
          else
            INDEX=$(find . -name "index.html" \
              -not -path "./.git/*" \
              -not -path "./target/debug/*" \
              -not -path "./target/wasm-dev/*" \
              -not -path "./target/wasm32-unknown-unknown/wasm-dev/*" \
              | head -1)
            if [ -z "$INDEX" ]; then
              echo "ERROR: could not find build output"
              exit 1
            fi
            FOUND_DIR=$(dirname "$INDEX")
            echo "Found build output at: $FOUND_DIR"
            ln -s "$(pwd)/$FOUND_DIR" dist
          fi

          echo "=== dist/ contents ==="
          find dist -type f | sort

      - name: Fix asset paths for GitHub Pages subdirectory
        run: |
          # Dioxus may generate absolute paths like /assets/... which break when
          # served from a subdirectory /greek_app/ on GitHub Pages.
          sed -i 's|"/assets/|"/greek_app/assets/|g' dist/index.html
          echo "=== dist/index.html ==="
          cat dist/index.html

      - name: Generate PWA icons
        run: |
          rsvg-convert -w 192 -h 192 assets/icons/icon.svg -o dist/icon-192.png
          rsvg-convert -w 512 -h 512 assets/icons/icon.svg -o dist/icon-512.png

      - name: Copy PWA assets to dist root
        run: |
          cp assets/manifest.json dist/manifest.json
          cp assets/sw.js dist/sw.js
          # 404.html needed for SPA routing on GitHub Pages
          cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
