name: Deploy Dioxus WASM

on:
  push:
    branches: ["main"]

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  DIOXUS_CONFIG_NON_INTERACTIVE: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get install -y imagemagick

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version "^0.7" --locked

      - name: Build Project
        run: dx build --release --platform web

      - name: Normalize dist to upload root
        run: |
          if [ -d "target/dx/morph-app/release/web/public" ]; then
            mkdir -p dist
            cp -r target/dx/morph-app/release/web/public/. dist/
          elif [ -f "dist/index.html" ]; then
            echo "dist/ already correct"
          else
            echo "ERROR: no build output found"; exit 1
          fi

      - name: Fix absolute asset paths for GitHub Pages subdirectory
        run: |
          # Dioxus uses two path formats in generated files:
          #   index.html  → /./assets/...   (preload + script src)
          #   JS bundle   → /assets/...     (WASM fetch URL, no ./)
          # Both resolve from the domain root and miss the /greek_app/ prefix.

          # Fix index.html (/./assets/ pattern)
          sed -i 's|/\./assets/|/greek_app/assets/|g' dist/index.html

          # Fix JS bundle: /./assets/ and plain /assets/ (WASM URL)
          sed -i 's|/\./assets/|/greek_app/assets/|g' dist/assets/*.js
          sed -i 's|"/assets/|"/greek_app/assets/|g'  dist/assets/*.js
          sed -i "s|'/assets/|'/greek_app/assets/|g"  dist/assets/*.js

          echo "=== dist/index.html after fix ==="
          cat dist/index.html

      - name: Generate PWA icons
        run: |
          # Pepe cut → 192×192 logo (tight crop from center)
          convert "assets/icons/Pepe cut.png" \
            -resize 192x192^ -gravity center -extent 192x192 \
            dist/icon-192.png
          # Pepe full → 512×512 (tight crop from center)
          convert "assets/icons/Pepe full.png" \
            -resize 512x512^ -gravity center -extent 512x512 \
            dist/icon-512.png

      - name: Copy PWA assets to dist root
        run: |
          cp assets/manifest.json dist/manifest.json
          cp assets/sw.js dist/sw.js
          # 404.html needed for SPA routing on GitHub Pages
          cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
