name: Deploy Dioxus WASM

on:
  push:
    branches: ["main"]

env:
  # Устраняем предупреждение о Node.js 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Dioxus CLI
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-sh | sh
          cargo binstall dioxus-cli --force

      - name: Build Project
        # Добавляем --verbose для детального лога в случае падения
        run: dx build --release --platform web --verbose

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Важно: проверьте, что папка dist или public действительно создается
          # Обычно это: target/dx/[имя_проекта]/release/web/public
          path: './target/dx/${{ github.event.repository.name }}/release/web/public/'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4