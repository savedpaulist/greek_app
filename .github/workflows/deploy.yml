name: Deploy Dioxus WASM

on:
  push:
    branches: ["main"]

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  DIOXUS_CONFIG_NON_INTERACTIVE: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get install -y librsvg2-bin

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version "^0.7" --locked

      - name: Build Project
        run: dx build --release --platform web

      - name: Find build output and show index.html
        run: |
          echo "=== All index.html files found after build ==="
          find . -name "index.html" \
            -not -path "./.git/*" \
            -not -path "./target/debug/*" \
            -not -path "./target/wasm-dev/*" \
            -not -path "./target/wasm32-unknown-unknown/wasm-dev/*"

          echo ""
          echo "=== All files in likely output dirs ==="
          for d in dist "dist/greek_app" "target/dx/morph-app/release/web/public"; do
            if [ -d "$d" ]; then
              echo "--- $d ---"
              find "$d" -type f | sort
            fi
          done

      - name: Normalize dist to upload root
        run: |
          # Dioxus with base_path="greek_app" may output to dist/greek_app/
          # We need to upload the folder that contains index.html directly.
          if [ -f "dist/index.html" ]; then
            echo "dist/ is already correct"
          elif [ -f "dist/greek_app/index.html" ]; then
            echo "Moving dist/greek_app/ contents up to dist/"
            cp -r dist/greek_app/. dist/
          elif [ -d "target/dx/morph-app/release/web/public" ]; then
            cp -r target/dx/morph-app/release/web/public/. dist/
            mkdir -p dist
          else
            INDEX=$(find . -name "index.html" \
              -not -path "./.git/*" \
              -not -path "./target/debug/*" \
              -not -path "./target/wasm-dev/*" \
              | head -1)
            [ -z "$INDEX" ] && echo "ERROR: no index.html found" && exit 1
            FOUND="$(dirname "$INDEX")"
            echo "Copying from $FOUND to dist/"
            mkdir -p dist
            cp -r "$FOUND"/. dist/
          fi

          echo ""
          echo "=== Final dist/ structure ==="
          find dist -type f | sort
          echo ""
          echo "=== dist/index.html ==="
          cat dist/index.html

      - name: Generate PWA icons
        run: |
          rsvg-convert -w 192 -h 192 assets/icons/icon.svg -o dist/icon-192.png
          rsvg-convert -w 512 -h 512 assets/icons/icon.svg -o dist/icon-512.png

      - name: Copy PWA assets to dist root
        run: |
          cp assets/manifest.json dist/manifest.json
          cp assets/sw.js dist/sw.js
          # 404.html needed for SPA routing on GitHub Pages
          cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
