name: Deploy Dioxus WASM

on:
  push:
    branches: ["main"]

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  DIOXUS_CONFIG_NON_INTERACTIVE: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get install -y librsvg2-bin

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --locked

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version "^0.7" --locked

      - name: Build Project
        run: dx build --release --platform web

      - name: Normalize dist directory
        run: |
          if [ -d "dist" ]; then
            echo "Found: dist/"
          elif [ -d "target/dx/morph-app/release/web/public" ]; then
            echo "Found: target/dx/morph-app/release/web/public — symlinking to dist/"
            ln -s "$(pwd)/target/dx/morph-app/release/web/public" dist
          else
            echo "=== Build output search ==="
            find . -name "index.html" \
              -not -path "./.git/*" \
              -not -path "./target/debug/*" \
              -not -path "./target/wasm-dev/*" \
              | head -10
            exit 1
          fi

      - name: Generate PWA icons
        run: |
          rsvg-convert -w 192 -h 192 assets/icons/icon.svg -o dist/icon-192.png
          rsvg-convert -w 512 -h 512 assets/icons/icon.svg -o dist/icon-512.png

      - name: Copy PWA assets to dist root
        run: |
          cp assets/manifest.json dist/manifest.json
          cp assets/sw.js dist/sw.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
